services:
  db:
    image: postgres:16-alpine
    container_name: ei_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: enterprise_intelligence
      POSTGRES_USER: ei_user
      POSTGRES_PASSWORD: ei_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql

volumes:
  pgdata:
